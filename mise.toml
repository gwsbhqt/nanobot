[tools]
python = "3.12"
uv = "latest"

[env]
_.path = ["./bin"]

[tasks.setup]
description = "Install nanobot and dependencies with uv (project env)"
run = [
  "uv sync --extra dev",
]

[tasks.status]
description = "Show nanobot status"
run = "uv run nanobot status"

[tasks.onboard]
description = "Initialize nanobot config/workspace without interactive prompt (refresh mode)"
run = "uv run nanobot onboard --refresh"

[tasks.smoke]
description = "Smoke-test direct LLM call without IM channels"
run = "uv run nanobot agent --logs -m \"只回复：LLM接入成功\""

[tasks.chat]
description = "Start nanobot interactive CLI chat in terminal"
run = "uv run nanobot agent"

[tasks.gateway]
description = "Start nanobot gateway (IM channels, e.g. Feishu)"
run = "uv run nanobot gateway"

[tasks.gateway-verbose]
description = "Start nanobot gateway with verbose logs"
run = "uv run nanobot gateway --verbose"
